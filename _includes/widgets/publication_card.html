<div class="card shadow-sm mb-4">

<div class="card-body">

<h3 class="card-title mb-3">
{{ include.title }}
</h3>

{% for item in include.items %}

<div class="publication-entry">

<div class="publication-title">
{{ item.title }}.
</div>

<div class="publication-meta">

{{ item.authors }}.

{% if item.venue %}
{{ item.venue }},
{% endif %}

{{ item.year }}.

<span class="publication-links">

{% if item.arxiv %}
<a href="{{ item.arxiv }}">arXiv</a>
{% endif %}

{% if item.pdf %}
<a href="{{ item.pdf }}">PDF</a>
{% endif %}

{% if item.slides %}
<a href="{{ item.slides }}">Slides</a>
{% endif %}

</span>

</div>

</div>

{% endfor %}

</div>
</div>
